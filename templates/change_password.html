{% extends "base.html" %}

{% block title %}修改密码 - 课本评分管理系统{% endblock %}

{% block content %}
<div class="change-password-container">
    <div class="change-password-card">
        <div class="change-password-header">
            <h2><i class="fas fa-key"></i> 修改密码</h2>
            <p>修改您的账户密码</p>
        </div>
        
        <form method="POST" class="change-password-form">
            <div class="form-group">
                <label for="current_password">
                    <i class="fas fa-lock"></i> 当前密码
                </label>
                <input type="password" id="current_password" name="current_password" required 
                       placeholder="请输入当前密码" class="form-control">
            </div>
            
            <div class="form-group">
                <label for="new_password">
                    <i class="fas fa-key"></i> 新密码
                </label>
                <input type="password" id="new_password" name="new_password" required 
                       placeholder="请输入新密码" minlength="6" class="form-control">
                <small class="form-text">密码长度至少6位</small>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">
                    <i class="fas fa-key"></i> 确认新密码
                </label>
                <input type="password" id="confirm_password" name="confirm_password" required 
                       placeholder="请再次输入新密码" class="form-control">
            </div>
            
            <div class="form-group">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> 修改密码
                </button>
                <a href="{{ url_for('index') }}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> 返回
                </a>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.querySelector('.change-password-form');
    const newPassword = document.getElementById('new_password');
    const confirmPassword = document.getElementById('confirm_password');
    
    form.addEventListener('submit', function(e) {
        if (newPassword.value.length < 6) {
            e.preventDefault();
            alert('密码长度至少6位');
            newPassword.focus();
            return false;
        }
        
        if (newPassword.value !== confirmPassword.value) {
            e.preventDefault();
            alert('两次输入的密码不一致');
            confirmPassword.focus();
            return false;
        }
        
        return true;
    });
});
</script>
{% endblock %}
